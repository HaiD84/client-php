name: Run tests

on:
  push:
    branches:
    tags:
  pull_request:
    branches:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [7.3, 7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5]
        os: [ubuntu-latest]
    name: PHP ${{ matrix.php }} Test on ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: json
        ini-values: zend.assertions=1, error_reporting=E_ALL
        coverage: none

    - name: PHP lint
      run: find lib/ -name \*.php -exec sh -c 'php -l "$0" || kill $PPID' \{\} \;

    - name: Validate composer.json and composer.lock
      run: composer validate

    - name: Get composer cache directory
      id: composer-cache
      run: echo "COMPOSER_CACHE_DIR=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.COMPOSER_CACHE_DIR }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run test suite
      run: make test
